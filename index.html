<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌍 2P World: Day/Night • Weather • Off-road • Drive & Shoot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            touch-action: none;
            overflow: hidden;
        }

        /* Landing Screen */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1e, #0f1a2a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .landing-card {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .landing-card h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .landing-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            padding: 14px 25px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin: 8px;
            cursor: pointer;
            width: calc(100% - 16px);
        }

        .room-code {
            font-size: 1.8rem;
            font-family: monospace;
            background: #000;
            padding: 12px;
            border-radius: 20px;
            letter-spacing: 4px;
            margin: 15px 0;
        }

        /* Game UI */
        #gameContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Crosshair */
        .crosshair {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        .crosshair::before {
            width: 20px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .crosshair::after {
            width: 2px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Mobile Controls */
        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            z-index: 50;
            pointer-events: none;
        }

        .steering-area {
            pointer-events: auto;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 130px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .steering-wheel {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .pedals {
            pointer-events: auto;
            display: flex;
            gap: 15px;
        }

        .pedal {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: bold;
        }
        .pedal.gas { background: rgba(76, 205, 196, 0.8); color: white; }
        .pedal.brake { background: rgba(255, 107, 107, 0.8); color: white; }

        .top-bar {
            position: fixed;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            z-index: 50;
            pointer-events: none;
        }

        .player-stats {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: white;
            pointer-events: auto;
        }

        .weather-info {
            position: fixed;
            top: 70px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: white;
            z-index: 50;
        }

        .weapon-selector {
            position: fixed;
            bottom: 160px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 8px;
            display: flex;
            gap: 8px;
            z-index: 50;
            pointer-events: auto;
        }

        .weapon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 12px;
            border-radius: 25px;
            color: white;
            font-size: 0.7rem;
        }

        .chat-popup {
            position: fixed;
            bottom: 160px;
            right: 10px;
            width: 260px;
            background: rgba(0,0,0,0.9);
            border-radius: 20px;
            z-index: 60;
            display: none;
        }

        .chat-messages {
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.7rem;
            color: white;
        }

        .chat-input-area {
            display: flex;
            padding: 8px;
            gap: 5px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: none;
        }

        .song-input {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 8px 12px;
            display: flex;
            gap: 5px;
            z-index: 50;
            pointer-events: auto;
        }

        .song-input input {
            width: 160px;
            padding: 6px;
            border-radius: 20px;
            border: none;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div id="landingScreen" class="screen">
    <div class="landing-card">
        <h1>🌍 2P WORLD</h1>
        <p>Day/Night • Weather • Off-road • Drive & Shoot</p>
        <input type="text" id="playerName" placeholder="Your Name" value="Player">
        <button class="btn" onclick="createRoom()">🏠 Create Room</button>
        <div style="margin: 10px;">— OR —</div>
        <input type="text" id="joinRoomCode" placeholder="Enter Room Code">
        <button class="btn" onclick="joinRoom()">🔗 Join Room</button>
        <div id="roomInfo" style="margin-top: 15px;"></div>
    </div>
</div>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div class="crosshair"></div>
    
    <div class="top-bar">
        <div class="player-stats" id="myStats">❤️ 100 | 🔫 30 | 💀 0</div>
        <div class="player-stats" id="otherStats">Opponent: ❤️ 100 | 💀 0</div>
    </div>
    
    <div class="weather-info" id="weatherInfo">☀️ Clear • Day</div>
    
    <div class="song-input">
        <input type="text" id="songUrlInput" placeholder="YouTube URL">
        <button onclick="syncSong()">🎵 Sync</button>
    </div>
    
    <div class="weapon-selector">
        <button class="weapon-btn" onclick="switchWeapon('pistol')">🔫 Pistol</button>
        <button class="weapon-btn" onclick="switchWeapon('rifle')">🔫 Rifle</button>
        <button class="weapon-btn" onclick="switchWeapon('shotgun')">💥 Shotgun</button>
    </div>
    
    <div class="controls-panel">
        <div class="steering-area" id="steeringArea">
            <div class="steering-wheel" id="steeringWheel">🚗</div>
        </div>
        <div class="pedals">
            <div class="pedal gas" ontouchstart="startGas()" ontouchend="stopGas()" onmousedown="startGas()" onmouseup="stopGas()">⚡ GAS</div>
            <div class="pedal brake" ontouchstart="startBrake()" ontouchend="stopBrake()" onmousedown="startBrake()" onmouseup="stopBrake()">🛑 BRAKE</div>
        </div>
    </div>
    
    <div class="chat-popup" id="chatPopup">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type message...">
            <button onclick="sendChat()">Send</button>
        </div>
    </div>
    
    <button style="position:fixed; bottom:10px; right:10px; background:#333; border:none; border-radius:30px; padding:8px 15px; color:white; z-index:50;" onclick="toggleChat()">💬</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let roomCode = null;
    let playerNumber = 1;
    let playerName = "";
    let players = {};
    let myId = null;
    let cars = [];
    let bullets = [];
    
    // Player state
    let myX = 2000, myY = 2000;
    let myAngle = 0;
    let myHealth = 100;
    let myAmmo = 30;
    let myKills = 0;
    let myDeaths = 0;
    let myWeapon = 'pistol';
    let isInCar = false;
    let currentCarId = null;
    let carAngle = 0;
    let carSpeed = 0;
    
    // Car controls
    let gasPressed = false;
    let brakePressed = false;
    let steeringAngle = 0;
    
    // Weather & Time system
    let timeOfDay = 0; // 0 to 360 degrees (0=dawn, 90=noon, 180=dusk, 270=night)
    let weatherType = 'clear'; // clear, rain, fog, storm
    let weatherTimer = 0;
    
    // Shooting
    let lastShootTime = 0;
    
    // Chat
    let chatOpen = false;
    
    // Canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let viewX = 0, viewY = 0;
    
    // Touch shooting
    let touchShootActive = false;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // Weather and Time cycle
    function updateWeatherAndTime() {
        // Time cycle (full cycle every 120 seconds)
        timeOfDay = (timeOfDay + 0.5) % 360;
        
        // Weather changes every 20-40 seconds
        weatherTimer++;
        if (weatherTimer > 2000 + Math.random() * 1000) {
            weatherTimer = 0;
            const weathers = ['clear', 'rain', 'fog', 'storm'];
            weatherType = weathers[Math.floor(Math.random() * weathers.length)];
            document.getElementById('weatherInfo').innerHTML = getWeatherIcon() + ' ' + getWeatherName() + ' • ' + getTimeName();
        }
        
        document.getElementById('weatherInfo').innerHTML = getWeatherIcon() + ' ' + getWeatherName() + ' • ' + getTimeName();
    }
    
    function getWeatherIcon() {
        switch(weatherType) {
            case 'clear': return '☀️';
            case 'rain': return '🌧️';
            case 'fog': return '🌫️';
            case 'storm': return '⛈️';
            default: return '☀️';
        }
    }
    
    function getWeatherName() {
        switch(weatherType) {
            case 'clear': return 'Clear';
            case 'rain': return 'Rain';
            case 'fog': return 'Fog';
            case 'storm': return 'Storm';
            default: return 'Clear';
        }
    }
    
    function getTimeName() {
        if (timeOfDay < 45) return 'Dawn';
        if (timeOfDay < 135) return 'Day';
        if (timeOfDay < 225) return 'Dusk';
        return 'Night';
    }
    
    function getLighting() {
        // Returns brightness factor (0-1) and color tint
        let brightness = 1;
        let tint = 'rgba(0,0,0,0)';
        
        if (timeOfDay > 180 && timeOfDay < 360) {
            brightness = 0.3 + (1 - (timeOfDay - 180) / 180) * 0.3;
            tint = `rgba(0,0,50,${1 - brightness})`;
        }
        
        return { brightness, tint };
    }
    
    // Get terrain type at position (off-road detection)
    function getTerrainType(x, y) {
        // Create different zones on map
        const zoneX = Math.floor(x / 500);
        const zoneY = Math.floor(y / 500);
        const zone = (zoneX + zoneY) % 4;
        
        if (zone === 0) return { type: 'road', speedMul: 1.0, color: '#555', name: '🏁 Highway' };
        if (zone === 1) return { type: 'offroad', speedMul: 0.5, color: '#8B7355', name: '🌾 Dirt' };
        if (zone === 2) return { type: 'sand', speedMul: 0.4, color: '#c2b280', name: '🏜️ Sand' };
        return { type: 'grass', speedMul: 0.7, color: '#4a7c59', name: '🌿 Grass' };
    }
    
    // Steering wheel
    const steeringArea = document.getElementById('steeringArea');
    const steeringWheel = document.getElementById('steeringWheel');
    
    steeringArea.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = steeringArea.getBoundingClientRect();
        const centerX = rect.left + rect.width/2;
        const touch = e.touches[0];
        const angle = Math.atan2(touch.clientY - (rect.top + rect.height/2), touch.clientX - centerX);
        steeringAngle = angle * 180 / Math.PI;
        steeringAngle = Math.max(-90, Math.min(90, steeringAngle));
        steeringWheel.style.transform = `rotate(${steeringAngle}deg)`;
    });
    
    steeringArea.addEventListener('touchend', () => {
        steeringAngle = 0;
        steeringWheel.style.transform = 'rotate(0deg)';
    });
    
    function startGas() { gasPressed = true; }
    function stopGas() { gasPressed = false; }
    function startBrake() { brakePressed = true; }
    function stopBrake() { brakePressed = false; }
    
    // SHOOTING: Touch anywhere on screen
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const touchY = (touch.clientY - rect.top) * (canvas.height / rect.height);
        
        // Convert to world coordinates
        const worldX = viewX + touchX;
        const worldY = viewY + touchY;
        
        shootAt(worldX, worldY);
    });
    
    function shootAt(targetX, targetY) {
        const now = Date.now();
        const fireDelay = myWeapon === 'rifle' ? 150 : (myWeapon === 'shotgun' ? 400 : 250);
        if (now - lastShootTime < fireDelay) return;
        if (myAmmo <= 0) return;
        
        lastShootTime = now;
        myAmmo--;
        updateUI();
        
        socket.emit('shoot', {
            roomCode,
            fromX: myX,
            fromY: myY,
            targetX: targetX,
            targetY: targetY,
            weapon: myWeapon
        });
    }
    
    function switchWeapon(weapon) {
        myWeapon = weapon;
        myAmmo = weapon === 'rifle' ? 30 : (weapon === 'shotgun' ? 8 : 15);
        updateUI();
    }
    
    function updateGame() {
        const terrain = getTerrainType(myX, myY);
        let speedMultiplier = terrain.speedMul;
        
        if (isInCar) {
            let acceleration = 0;
            if (gasPressed) acceleration = 0.25 * speedMultiplier;
            if (brakePressed) acceleration = -0.4;
            
            carSpeed += acceleration;
            carSpeed *= 0.98;
            
            // Max speeds based on terrain
            let maxSpeed = 8 * speedMultiplier;
            if (carSpeed > maxSpeed) carSpeed = maxSpeed;
            if (carSpeed < -3) carSpeed = -3;
            
            carAngle += steeringAngle * 0.08;
            
            myX += Math.cos(carAngle * Math.PI/180) * carSpeed;
            myY += Math.sin(carAngle * Math.PI/180) * carSpeed;
        } else {
            // Walking speed affected by terrain
            // (simple walking not fully implemented for mobile)
        }
        
        // Map boundaries (5000x5000 world)
        myX = Math.max(100, Math.min(4900, myX));
        myY = Math.max(100, Math.min(4900, myY));
        
        // Send position
        socket.emit('playerMove', {
            roomCode,
            x: myX,
            y: myY,
            angle: myAngle,
            isInCar,
            carAngle,
            carSpeed
        });
        
        // Enter cars automatically
        for (let car of cars) {
            const dist = Math.hypot(myX - car.x, myY - car.y);
            if (dist < 50 && !isInCar && car.available) {
                socket.emit('enterCar', { roomCode, carId: car.id });
            }
        }
    }
    
    function draw() {
        if (!ctx) return;
        
        const lighting = getLighting();
        
        // Background with time-of-day color
        let skyColor;
        if (timeOfDay < 45) skyColor = '#87CEEB';
        else if (timeOfDay < 135) skyColor = '#4ecdc4';
        else if (timeOfDay < 225) skyColor = '#ff6b6b';
        else skyColor = '#0a0f2e';
        
        ctx.fillStyle = skyColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        viewX = myX - canvas.width/2;
        viewY = myY - canvas.height/2;
        
        // Draw terrain grid with colors
        for (let i = 0; i < 5000; i += 100) {
            for (let j = 0; j < 5000; j += 100) {
                const terrain = getTerrainType(i, j);
                ctx.fillStyle = terrain.color;
                ctx.fillRect(i - viewX, j - viewY, 100, 100);
            }
        }
        
        // Draw roads
        for (let i = 0; i < 5000; i += 500) {
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(i - viewX, 0);
            ctx.lineTo(i - viewX, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i - viewY);
            ctx.lineTo(canvas.width, i - viewY);
            ctx.stroke();
        }
        
        // Draw trees/obstacles (off-road)
        for (let i = 0; i < 200; i++) {
            const treeX = (i * 131) % 5000;
            const treeY = (i * 253) % 5000;
            const terrain = getTerrainType(treeX, treeY);
            if (terrain.type !== 'road') {
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.rect(treeX - viewX - 5, treeY - viewY - 5, 10, 10);
                ctx.fill();
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(treeX - viewX - 2, treeY - viewY, 4, 8);
            }
        }
        
        // Cars
        for (let car of cars) {
            ctx.save();
            ctx.translate(car.x - viewX, car.y - viewY);
            ctx.fillStyle = car.available ? '#4ecdc4' : '#888';
            ctx.fillRect(-25, -18, 50, 36);
            ctx.fillStyle = '#333';
            ctx.fillRect(-30, -10, 12, 20);
            ctx.fillRect(18, -10, 12, 20);
            ctx.fillStyle = 'white';
            ctx.font = '10px monospace';
            ctx.fillText(car.type, -20, -25);
            ctx.restore();
        }
        
        // Other players
        for (let id in players) {
            if (id === myId) continue;
            const p = players[id];
            ctx.save();
            ctx.translate(p.x - viewX, p.y - viewY);
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(0, 0, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '10px monospace';
            ctx.fillText(p.name, -20, -25);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(-20, -35, 40 * (p.health/100), 5);
            ctx.restore();
        }
        
        // My player
        ctx.save();
        ctx.translate(myX - viewX, myY - viewY);
        ctx.fillStyle = '#4ecdc4';
        ctx.beginPath();
        ctx.arc(0, 0, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = 'bold 12px monospace';
        ctx.fillText('YOU', -12, -30);
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(-20, -42, 40 * (myHealth/100), 5);
        
        // Car direction
        if (isInCar) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(carAngle * Math.PI/180) * 30, Math.sin(carAngle * Math.PI/180) * 30);
            ctx.strokeStyle = 'yellow';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        ctx.restore();
        
        // Bullets
        for (let b of bullets) {
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(b.x - viewX, b.y - viewY, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Weather effects
        if (weatherType === 'rain') {
            ctx.fillStyle = 'rgba(173,216,230,0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            for (let i = 0; i < 100; i++) {
                ctx.fillRect((i * 131) % canvas.width, (Date.now() + i * 50) % canvas.height, 2, 10);
            }
        } else if (weatherType === 'fog') {
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (weatherType === 'storm') {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Lightning flash
            if (Math.random() < 0.01) {
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        // Night/darkness overlay
        if (lighting.brightness < 0.7) {
            ctx.fillStyle = `rgba(0,0,30,${1 - lighting.brightness})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }
    
    function gameLoop() {
        updateWeatherAndTime();
        updateGame();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    function updateUI() {
        document.getElementById('myStats').innerHTML = `❤️ ${Math.max(0, myHealth)} | 🔫 ${myAmmo} | 💀 ${myDeaths} | 🏆 ${myKills}`;
        if (players[Object.keys(players)[0]]) {
            const opp = Object.values(players)[0];
            document.getElementById('otherStats').innerHTML = `Opponent: ❤️ ${opp?.health || 100} | 💀 ${opp?.deaths || 0}`;
        }
    }
    
    // Socket events
    function createRoom() {
        playerName = document.getElementById('playerName').value || 'Player';
        socket = io();
        socket.on('connect', () => socket.emit('createRoom', { playerName }));
        socket.on('roomCreated', (data) => {
            roomCode = data.roomCode;
            myId = socket.id;
            document.getElementById('roomInfo').innerHTML = `<div class="room-code">Code: ${roomCode}</div><p>Share this code with your friend!</p>`;
            document.getElementById('landingScreen').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            setupSocketListeners();
            gameLoop();
        });
    }
    
    function joinRoom() {
        const code = document.getElementById('joinRoomCode').value.toUpperCase();
        if (!code) return;
        playerName = document.getElementById('playerName').value || 'Player';
        socket = io();
        socket.on('connect', () => socket.emit('joinRoom', { roomCode: code, playerName }));
        socket.on('joined', () => {
            myId = socket.id;
            roomCode = code;
            document.getElementById('landingScreen').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            setupSocketListeners();
            gameLoop();
        });
        socket.on('joinError', (msg) => alert(msg));
    }
    
    function setupSocketListeners() {
        socket.on('gameState', (state) => {
            players = state.players;
            cars = state.cars;
            for (let id in players) {
                if (id === myId) {
                    myX = players[id].x;
                    myY = players[id].y;
                    myHealth = players[id].health;
                    myKills = players[id].kills;
                    myDeaths = players[id].deaths;
                }
            }
            updateUI();
        });
        
        socket.on('playerUpdate', (data) => { if (players[data.id]) { players[data.id].x = data.x; players[data.id].y = data.y; } });
        socket.on('playerJoined', (data) => { players[data.id] = data; });
        socket.on('playerLeft', (id) => { delete players[id]; });
        socket.on('bulletFired', (bullet) => { bullets.push(bullet); setTimeout(() => { bullets = bullets.filter(b => b.id !== bullet.id); }, 500); });
        socket.on('playerHit', (data) => { if (data.id === myId) { myHealth = data.health; updateUI(); } });
        socket.on('playerDied', (data) => { if (data.id === myId) { myDeaths = data.deaths; myHealth = 100; } updateUI(); });
        socket.on('carEntered', (data) => { if (data.playerId === myId) { isInCar = true; currentCarId = data.carId; } });
        socket.on('chatMessage', (data) => { const div = document.getElementById('chatMessages'); div.innerHTML += `<div><strong>${data.playerName}:</strong> ${data.message}</div>`; div.scrollTop = div.scrollHeight; });
        socket.on('songSync', (data) => { console.log('Sync song:', data.songUrl); });
    }
    
    function sendChat() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (msg && socket) { socket.emit('chatMessage', { roomCode, message: msg, playerName }); input.value = ''; }
    }
    
    function toggleChat() {
        const popup = document.getElementById('chatPopup');
        chatOpen = !chatOpen;
        popup.style.display = chatOpen ? 'block' : 'none';
    }
    
    function syncSong() {
        const url = document.getElementById('songUrlInput').value;
        if (url && socket) { socket.emit('syncSong', { roomCode, songUrl: url }); alert('🎵 Song synced with friend!'); }
    }
    
    window.createRoom = createRoom;
    window.joinRoom = joinRoom;
    window.sendChat = sendChat;
    window.toggleChat = toggleChat;
    window.syncSong = syncSong;
    window.switchWeapon = switchWeapon;
    window.startGas = startGas;
    window.stopGas = stopGas;
    window.startBrake = startBrake;
    window.stopBrake = stopBrake;
</script>
</body>
</html>
